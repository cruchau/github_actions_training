version: 0.2

env:
  variables:
    REPO_NAME: github-actions-training
    REGION: us-east-1
    ACCOUNT_ID: 633911632242

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies"
      - make install

  pre_build:
    commands:
      - echo "Linting code"
      - make lint
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
      - export REPO_URI="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$REPO_NAME"
      - export IMAGE_TAG="$CODEBUILD_RESOLVED_SOURCE_VERSION"
      - echo "Repository URI: $REPO_URI"
      - echo "Image tag: $IMAGE_TAG"
      - echo "Pulling latest image if it exists..."
      - sh -c "docker pull \"$REPO_URI:latest\" || true"

  build:
    commands:
      - echo "Running tests"
      - make test
      - echo "Building Docker image..."
      - sh -c "docker build -t \"$REPO_URI:$IMAGE_TAG\" ."
      - sh -c "docker tag \"$REPO_URI:$IMAGE_TAG\" \"$REPO_URI:latest\""

  post_build:
    commands:
      - echo "Pushing Docker image to ECR..."
      - sh -c "docker push \"$REPO_URI:$IMAGE_TAG\""
      - sh -c "docker push \"$REPO_URI:latest\""
      - echo "Docker image successfully pushed: $REPO_URI:$IMAGE_TAG"

artifacts:
  files:
    - '**/*'
  discard-paths: no