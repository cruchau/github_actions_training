name: Run Python Tests

on:
  push:
    branches:
      - main # push to main runs only test job (lint and test)
      - staging # push to staging runs both test and load-test jobs (lint, test, and load test)
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: make install

      - name: Run Linter
        run: make lint

      - name: Run Tests
        run: make test


  load-test:
    runs-on: ubuntu-latest
    needs: test # load-test job will only run after the test job has completed successfully
    if: github.ref == 'refs/heads/staging' # only run load test if the push is to staging branch

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install locust

      - name: Start application
        run: |
          python app.py &
          sleep 5

      - name: Run Load Test
        run: |
          locust -f locustfile.py \
          --headless \
          -u 50 \
          -r 10 \
          -t 1m \
          --host http://localhost:8000